<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经济学人助手小季</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: #2b2418;
      background: #f6f0e6;
    }

    main {
      width: min(560px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    section {
      padding: 28px;
      border: 1px solid #d8c7aa;
      border-radius: 8px;
      background: #fffaf2;
      box-shadow: 0 18px 50px rgba(80, 58, 33, 0.1);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 34px;
      line-height: 1.15;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #6f6556;
      font-size: 14px;
    }

    input[type="password"],
    input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8c7aa;
      border-radius: 6px;
      background: #fff;
      color: #2b2418;
      font-size: 15px;
    }

    input:disabled {
      color: #6f6556;
      background: #f1eadf;
    }

    button {
      width: 100%;
      min-height: 44px;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      background: #9f4a22;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: #7e3818;
    }

    button:disabled {
      background: #d9d1c4;
      color: #6f6556;
      cursor: not-allowed;
    }

    p {
      margin: 16px 0 0;
      color: #6f6556;
      font-size: 14px;
      line-height: 1.5;
    }

    .message,
    .error {
      margin: 14px 0 0;
      min-height: 21px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message {
      color: #236b45;
    }

    .error {
      color: #a12727;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>经济学人助手小季</h1>

      <label for="accessPassword">访问口令</label>
      <input id="accessPassword" type="password" autocomplete="off" placeholder="请输入访问口令">
      <button id="verifyButton" type="button">验证口令</button>
      <div id="authMessage" class="message"></div>
      <div id="authError" class="error"></div>

      <form id="uploadForm" action="/submit" method="post" enctype="multipart/form-data">
        <input id="accessPasswordField" type="hidden" name="access_password" value="">
        <label for="epubFile">EPUB 文件</label>
        <input id="epubFile" name="file" type="file" accept=".epub,application/epub+zip" required disabled>
        <button id="uploadButton" type="submit" disabled>上传并处理</button>
      </form>
      <p>上传后会进入任务状态页，处理完成后可下载 Word。</p>
    </section>
  </main>

  <script>
    const accessPasswordInput = document.getElementById("accessPassword");
    const accessPasswordField = document.getElementById("accessPasswordField");
    const verifyButton = document.getElementById("verifyButton");
    const authMessage = document.getElementById("authMessage");
    const authError = document.getElementById("authError");
    const uploadForm = document.getElementById("uploadForm");
    const fileInput = document.getElementById("epubFile");
    const uploadButton = document.getElementById("uploadButton");

    let isVerified = false;

    function setUploadEnabled(isEnabled) {
      fileInput.disabled = !isEnabled;
      uploadButton.disabled = !isEnabled;
    }

    function resetVerifiedState() {
      isVerified = false;
      accessPasswordField.value = "";
      authMessage.textContent = "";
      setUploadEnabled(false);
    }

    async function verifyPassword() {
      const password = accessPasswordInput.value.trim();
      if (!password) {
        authError.textContent = "请先输入访问口令。";
        resetVerifiedState();
        return;
      }

      const formData = new FormData();
      formData.append("access_password", password);

      try {
        verifyButton.disabled = true;
        authMessage.textContent = "正在验证口令。";
        authError.textContent = "";

        const response = await fetch("/auth/check", {
          method: "POST",
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "访问口令错误");
        }

        isVerified = true;
        accessPasswordField.value = password;
        accessPasswordInput.disabled = true;
        authMessage.textContent = "口令已通过，可以选择 EPUB 文件。";
        setUploadEnabled(true);
      } catch (error) {
        resetVerifiedState();
        authMessage.textContent = "";
        authError.textContent = error.message || "访问口令错误";
      } finally {
        verifyButton.disabled = isVerified;
      }
    }

    verifyButton.addEventListener("click", verifyPassword);

    accessPasswordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        verifyPassword();
      }
    });

    uploadForm.addEventListener("submit", (event) => {
      if (!isVerified) {
        event.preventDefault();
        authError.textContent = "请先验证访问口令。";
      }
    });

    setUploadEnabled(false);
  </script>
</body>
</html>
