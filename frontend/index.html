<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经济学人助手小季</title>
  <style>
    :root {
      --bg: #f6f0e6;
      --panel: #fffaf2;
      --line: #d8c7aa;
      --text: #2b2418;
      --muted: #6f6556;
      --accent: #9f4a22;
      --accent-dark: #7e3818;
      --success: #236b45;
      --error: #a12727;
      --disabled: #d9d1c4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(246, 240, 230, 0.92), rgba(246, 240, 230, 0.98)),
        url("https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
    }

    main {
      width: min(560px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    .panel {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.96);
      box-shadow: 0 18px 50px rgba(80, 58, 33, 0.12);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 36px;
      line-height: 1.15;
      text-align: center;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 14px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button,
    .download {
      min-height: 42px;
      padding: 10px 16px;
      border: 0;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
    }

    button {
      background: var(--accent);
      color: #fff;
    }

    button:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    button:disabled,
    .download[aria-disabled="true"] {
      background: var(--disabled);
      color: var(--muted);
      cursor: not-allowed;
    }

    .download {
      display: inline-flex;
      align-items: center;
      background: var(--success);
      color: #fff;
    }

    .download[aria-disabled="true"] {
      pointer-events: none;
    }

    .message,
    .file-name,
    .error {
      margin-top: 16px;
      min-height: 21px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message {
      color: var(--success);
    }

    .file-name {
      color: var(--muted);
    }

    .error {
      color: var(--error);
    }

    @media (max-width: 520px) {
      main {
        padding-top: 36px;
      }

      .panel {
        padding: 22px;
      }

      h1 {
        font-size: 30px;
      }

      button,
      .download {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>经济学人助手小季</h1>

      <label for="epubFile">EPUB 文件</label>
      <input id="epubFile" type="file" accept=".epub,application/epub+zip">
      <div id="fileNameText" class="file-name">尚未选择文件。</div>

      <div class="actions">
        <button id="uploadButton" type="button" disabled>上传并处理</button>
        <a id="downloadLink" class="download" href="#" aria-disabled="true">下载 Word</a>
      </div>

      <div id="messageText" class="message"></div>
      <div id="errorText" class="error"></div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("epubFile");
    const uploadButton = document.getElementById("uploadButton");
    const downloadLink = document.getElementById("downloadLink");
    const fileNameText = document.getElementById("fileNameText");
    const messageText = document.getElementById("messageText");
    const errorText = document.getElementById("errorText");

    let currentTaskId = "";
    let pollTimer = null;
    let selectedFile = null;

    function showMessage(message) {
      messageText.textContent = message || "";
    }

    function showError(message) {
      errorText.textContent = message || "";
    }

    function errorMessage(error) {
      if (!error) {
        return "操作失败";
      }
      if (typeof error === "string") {
        return error;
      }
      if (error.message) {
        return error.message;
      }
      if (Array.isArray(error.detail)) {
        return error.detail.map((item) => {
          const loc = Array.isArray(item.loc) ? item.loc.join(".") : "";
          const msg = item.msg || JSON.stringify(item);
          return loc ? `${loc}: ${msg}` : msg;
        }).join("\n");
      }
      if (error.detail) {
        return String(error.detail);
      }
      return JSON.stringify(error);
    }

    function setBusy(isBusy) {
      uploadButton.disabled = isBusy || !selectedFile;
      fileInput.disabled = isBusy;
    }

    function hideDownload() {
      downloadLink.href = "#";
      downloadLink.setAttribute("aria-disabled", "true");
    }

    function showDownload() {
      downloadLink.href = `/tasks/${currentTaskId}/download?access_password=`;
      downloadLink.setAttribute("aria-disabled", "false");
    }

    function stopPolling() {
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
    }

    async function uploadFile() {
      const file = selectedFile;
      if (!file) {
        showError("请先选择一个 EPUB 文件。");
        return;
      }

      const formData = new FormData();
      formData.append("access_password", "");
      formData.append("file", file);

      try {
        setBusy(true);
        hideDownload();
        stopPolling();
        showMessage("正在上传，请稍候。");
        showError("");

        const response = await fetch("/tasks", {
          method: "POST",
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw payload;
        }

        currentTaskId = payload.task_id;
        showMessage("任务已提交，正在处理。");
        pollStatus();
      } catch (error) {
        showMessage("");
        showError(errorMessage(error));
      } finally {
        setBusy(false);
      }
    }

    async function pollStatus() {
      if (!currentTaskId) {
        return;
      }

      try {
        const response = await fetch(`/tasks/${currentTaskId}?access_password=`);
        const payload = await response.json();
        if (!response.ok) {
          throw payload;
        }

        if (payload.status === "pending" || payload.status === "running") {
          showMessage("任务处理中，请稍候。");
          pollTimer = setTimeout(pollStatus, 3000);
          return;
        }

        stopPolling();
        if (payload.status === "succeeded") {
          showMessage("处理完成，可以下载。");
          showError("");
          showDownload();
        } else if (payload.status === "failed") {
          showMessage("");
          showError(payload.error || "处理失败，请重新上传或稍后再试。");
        }
      } catch (error) {
        stopPolling();
        showMessage("");
        showError(errorMessage(error));
      }
    }

    uploadButton.addEventListener("click", uploadFile);

    fileInput.addEventListener("change", () => {
      selectedFile = fileInput.files[0] || null;
      if (selectedFile) {
        fileNameText.textContent = `已选择：${selectedFile.name}`;
        showError("");
      } else {
        fileNameText.textContent = "尚未选择文件。";
      }
      setBusy(false);
    });

    setBusy(false);
    hideDownload();
  </script>
</body>
</html>
