<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经济学人助手小季</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: #2b2418;
      background: #f6f0e6;
    }

    main {
      width: min(560px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    section {
      padding: 28px;
      border: 1px solid #d8c7aa;
      border-radius: 8px;
      background: #fffaf2;
      box-shadow: 0 18px 50px rgba(80, 58, 33, 0.1);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 34px;
      line-height: 1.15;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #6f6556;
      font-size: 14px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8c7aa;
      border-radius: 6px;
      background: #fff;
      color: #2b2418;
      font-size: 15px;
    }

    button {
      width: 100%;
      min-height: 44px;
      margin-top: 18px;
      border: 0;
      border-radius: 6px;
      background: #9f4a22;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #7e3818;
    }

    p {
      margin: 16px 0 0;
      color: #6f6556;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>经济学人助手小季</h1>
      <form action="/submit" method="post" enctype="multipart/form-data">
        <input type="hidden" name="access_password" value="">
        <label for="epubFile">EPUB 文件</label>
        <input id="epubFile" name="file" type="file" accept=".epub,application/epub+zip" required>
        <button type="submit">上传并处理</button>
      </form>
      <p>上传后会进入任务状态页，处理完成后可下载 Word。</p>
    </section>
  </main>
</body>
</html>
